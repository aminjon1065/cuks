# LiveKit Egress config (docs/modules/14 §4/§6). Records room-composite MP4s to the
# MinIO `recordings` bucket. DEV only; the key/secret match livekit.yaml and the
# api's .env. Egress runs headless Chrome, so it is opt-in in dev (compose profile
# `recording`) and fully exercised from task 6.6.
redis:
  address: redis:6379

api_key: devkey
api_secret: devsecretdevsecretdevsecretdevsecret

# LiveKit signaling (plain ws in dev — see `insecure` below).
ws_url: ws://livekit:7880

# Recordings land in the shared app bucket under a `recordings/` key prefix (task 6.6) — this lets the
# api's StorageService presign the range download and the worker's retention sweep delete the object,
# both of which are bound to S3_BUCKET (`cuks`). MinIO speaks the S3 API with path-style addressing.
s3:
  access_key: cuks
  secret: cuks-dev-secret
  region: us-east-1
  endpoint: http://minio:9000
  bucket: cuks
  force_path_style: true

# Allow the non-TLS LiveKit ws:// and http:// MinIO endpoints in dev.
insecure: true
log_level: info
