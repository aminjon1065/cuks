# Martin tile server (docs/modules/10 §4, docs/02 ADR-7). Serves vector MVT
# straight from PostGIS + a PMTiles basemap. Sits behind Caddy, which enforces
# the tile token via forward_auth (docs/modules/10 §9) — Martin itself is only
# reachable inside the docker network.
listen_addresses: '0.0.0.0:3000'

postgres:
  # Env substitution (Martin supports ${VAR}); keeps creds out of the file and
  # identical between dev and prod.
  connection_string: ${DATABASE_URL}
  # Auto-catalog the spatial schema only: admin_units / facilities / risk_zones
  # become table sources; gis.incidents_mvt (0015) and gis.layer_features_mvt
  # (0021) become function sources. `app` stays private (docs/07 §gis).
  #
  # The map reads drawn features through the *function* source, never the
  # layer_features table source: Martin caches table tiles by (source, z, x, y)
  # alone, so an edited feature would keep returning the stale tile. A function
  # source's cache key includes its query params, so the map's `?v=<revision>`
  # always fetches what was just written.
  auto_publish:
    from_schemas:
      - gis

# Basemap: any *.pmtiles in this directory (built by infra/scripts/build-basemap.sh)
# is published as a source named after the file (e.g. region.pmtiles → "region").
pmtiles:
  paths:
    - /basemap
