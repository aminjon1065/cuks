# CUKS production stack — single host (docs/08-deployment.md, task 7.1). Only Caddy (80/443) and the
# LiveKit media/TURN ports face the outside; everything else is internal to the compose network.
#
# Run every command FROM THE REPO ROOT with `--env-file .env`. The `--env-file` is required: without it,
# Compose looks for `.env` next to this file (infra/docker/.env), not the repo-root .env where the secrets
# live, and the ${VAR:?...} guards abort. Secrets come from a root-level .env (chmod 600) — see
# .env.prod.example / docs/runbook-install.md. Convenient alias:
#   alias dc='docker compose --env-file .env -f infra/docker/compose.prod.yaml'
# Build:                dc build
# Migrate then start:   dc run --rm api pnpm db:migrate   (docs/08 §Обновление)
#                       dc up -d
name: cuks

x-logging: &logging
  driver: json-file
  options:
    max-size: '50m'
    max-file: '5'

services:
  caddy:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: caddy
    restart: unless-stopped
    environment:
      CUKS_DOMAIN: ${CUKS_DOMAIN}
      # Set to "tls internal" for a fully-closed network (Caddy's own CA).
      CUKS_TLS_INTERNAL: ${CUKS_TLS_INTERNAL:-}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [api, martin, geoserver, minio, livekit]
    mem_limit: 256m
    logging: *logging

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: api
    restart: unless-stopped
    env_file: [../../.env]
    environment:
      NODE_ENV: production
      # The signing CA key lives (encrypted) on this volume (docs/09 §4).
      CA_DATA_DIR: /data/ca
    volumes:
      - ca_data:/data/ca
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    mem_limit: 1g
    logging: *logging

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: worker
    restart: unless-stopped
    env_file: [../../.env]
    environment:
      NODE_ENV: production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    mem_limit: 2g
    logging: *logging

  postgres:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cuks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cuks}
      TZ: Asia/Dushanbe
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Expose 5432 to a VPN/allowlist only if GIS specialists need QGIS -> PostGIS (docs/08 §firewall).
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cuks} -d ${POSTGRES_DB:-cuks}']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 4g
    logging: *logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 1g
    logging: *logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    logging: *logging

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: ['--config', '/etc/livekit.yaml']
    environment:
      # Inject the key/secret so no secret lives in the config file. Key name is `cuks`.
      LIVEKIT_KEYS: 'cuks: ${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET}'
    ports:
      - '7881:7881' # ICE/TCP fallback
      - '7882:7882/udp' # ICE/UDP mux (primary media path — must be open)
      # - '5349:5349'   # TURN/TLS — only when embedded TURN is enabled (see livekit.prod.yaml + runbook)
    volumes:
      - ./livekit/livekit.prod.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis: { condition: service_healthy }
    mem_limit: 2g
    logging: *logging

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    environment:
      # Config inline (not a mounted file) so the secrets come from .env via compose interpolation and
      # never land in git. api_secret must equal LIVEKIT_API_SECRET; s3 creds equal the MinIO root creds.
      # Recordings land in S3_BUCKET (cuks) under recordings/ — the api presigns, the worker sweeps them.
      EGRESS_CONFIG_BODY: |
        redis:
          address: redis:6379
        api_key: cuks
        api_secret: ${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        s3:
          access_key: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
          secret: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
          region: ${S3_REGION:-us-east-1}
          endpoint: http://minio:9000
          bucket: ${S3_BUCKET:-cuks}
          force_path_style: true
        insecure: true
        log_level: info
    volumes:
      - egresstmp:/tmp
    shm_size: '1gb'
    depends_on:
      redis: { condition: service_healthy }
      livekit: { condition: service_started }
      minio: { condition: service_healthy }
    mem_limit: 3g
    logging: *logging

  martin:
    image: ghcr.io/maplibre/martin:latest
    restart: unless-stopped
    command: ['--config', '/config/config.yaml']
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cuks}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cuks}
    volumes:
      - ../martin/config.yaml:/config/config.yaml:ro
      - ../basemap:/basemap:ro
    depends_on:
      postgres: { condition: service_healthy }
    mem_limit: 512m
    logging: *logging

  geoserver:
    image: docker.osgeo.org/geoserver:2.26.1
    restart: unless-stopped
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:?set GEOSERVER_ADMIN_PASSWORD}
      SKIP_DEMO_DATA: 'true'
      # Serve only under the /geoserver context path that Caddy proxies.
      PROXY_BASE_URL: https://${CUKS_DOMAIN}/geoserver
    volumes:
      - geoserverdata:/opt/geoserver_data
    depends_on:
      postgres: { condition: service_healthy }
    mem_limit: 2g
    logging: *logging

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    volumes:
      - clamavdata:/var/lib/clamav
    healthcheck:
      test: ['CMD', 'clamdcheck.sh']
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 120s
    mem_limit: 2g
    logging: *logging

  # Volume backup (docs/08 §Бэкапы). Task 7.2 wires the restic repository + schedule + restore drill;
  # this ships a nightly local mirror of the data volumes so a fresh install already has a safety net.
  backup:
    image: offen/docker-volume-backup:v2
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: '0 2 * * *'
      BACKUP_FILENAME: 'cuks-%Y%m%d-%H%M%S.tar.gz'
      BACKUP_RETENTION_DAYS: '30'
    volumes:
      - pgdata:/backup/pgdata:ro
      - miniodata:/backup/miniodata:ro
      - geoserverdata:/backup/geoserverdata:ro
      - ca_data:/backup/ca:ro
      - backupdata:/archive
    mem_limit: 512m
    logging: *logging

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdata:
  geoserverdata:
  caddy_data:
  caddy_config:
  ca_data:
  egresstmp:
  backupdata:
