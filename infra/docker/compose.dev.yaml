# Development infrastructure only (docs/03 §infra). Application processes
# (api/web/worker) run on the host via `pnpm dev`. Credentials here are
# dev-only and intentionally static — never reuse them in production.
#
# Services for later phases (Martin, GeoServer, LiveKit) are added in their
# respective phases (2 and 6) to keep the dev footprint small.
name: cuks-dev

services:
  postgres:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    environment:
      POSTGRES_USER: cuks
      POSTGRES_PASSWORD: cuks
      POSTGRES_DB: cuks
      TZ: Asia/Dushanbe
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cuks -d cuks']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: cuks
      MINIO_ROOT_PASSWORD: cuks-dev-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    ports:
      - '3310:3310'
    volumes:
      - clamavdata:/var/lib/clamav
    healthcheck:
      test: ['CMD', 'clamdcheck.sh']
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 120s

  maildev:
    image: maildev/maildev:latest
    restart: unless-stopped
    ports:
      - '1080:1080' # web UI
      - '1025:1025' # SMTP
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:1080']
      interval: 15s
      timeout: 5s
      retries: 5

  # Vector tile server (phase 2.2). In dev the token gate is not enforced (no
  # Caddy) — the web dev proxy forwards /tiles → martin directly. Prod puts Caddy
  # forward_auth in front (infra/caddy/Caddyfile).
  martin:
    image: ghcr.io/maplibre/martin:latest
    restart: unless-stopped
    command: ['--config', '/config/config.yaml']
    environment:
      DATABASE_URL: postgres://cuks:cuks@postgres:5432/cuks
    ports:
      - '3001:3000'
    volumes:
      - ../martin/config.yaml:/config/config.yaml:ro
      - ../basemap:/basemap:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/health']
      interval: 15s
      timeout: 5s
      retries: 5

  geoserver:
    # OSGeo official image (multi-arch: works on arm64). Data dir persisted so the
    # workspace/datastore the api creates via REST survive restarts.
    image: docker.osgeo.org/geoserver:2.26.1
    restart: unless-stopped
    environment:
      # Dev credentials; docs/09 §7 requires replacing the default in production.
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
      # Only the workspace the platform manages is reachable through the proxy.
      SKIP_DEMO_DATA: 'true'
    ports:
      - '8080:8080'
    volumes:
      - geoserverdata:/opt/geoserver_data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://127.0.0.1:8080/geoserver/web/']
      interval: 30s
      timeout: 10s
      retries: 10

  # Realtime SFU for calls/conferences (phase 6, docs/modules/14). Config + keys in
  # infra/docker/livekit/livekit.yaml; the api is the sole token source (task 6.2)
  # and verifies the webhooks LiveKit posts back. No healthcheck: the minimal image
  # ships no shell/wget, so dependents wait on `service_started`.
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: ['--config', '/etc/livekit.yaml']
    # The api runs on the host in dev; let LiveKit reach its webhook endpoint.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '7880:7880' # http/ws signaling
      - '7881:7881' # ICE/TCP fallback
      - '7882:7882/udp' # ICE/UDP mux
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  # Recording (Egress) runs headless Chrome — heavy and finicky on Docker Desktop —
  # so it is opt-in via `docker compose --profile recording up` (used from task 6.6).
  # The default `up` does not start it.
  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    profiles: ['recording']
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./livekit/egress.yaml:/etc/egress.yaml:ro
      - egresstmp:/tmp
    # Chrome needs a larger shared-memory segment than the 64 MB default.
    shm_size: '1gb'
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdata:
  geoserverdata:
  egresstmp:
